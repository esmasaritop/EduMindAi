name: EduMindAI
options:
  bundleIdPrefix: com.edumindai
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  EduMindAI:
    type: application
    platform: iOS
    sources:
      - path: EduMindAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edumindai.app
        INFOPLIST_FILE: Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
